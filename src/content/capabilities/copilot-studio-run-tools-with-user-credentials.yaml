title: Run tools with user credentials
product: microsoft-copilot-studio
phase: build
supportingPhases:
  - govern
appliesTo:
  - maker-tool
summary: >-
  Agents can be configured to call downstream tools using the signed-in
  user's identity rather than a shared service account, so existing
  authorization, auditing and DLP applied to that user keep working when
  the agent acts on their behalf.
categories:
  - identity
status: published
sources:
  - title: Authentication for Copilot Studio agents
    url: https://learn.microsoft.com/en-us/microsoft-copilot-studio/configuration-end-user-authentication
