title: Private networking and Virtual Network integration
product: azure-ai-foundry
phase: build
appliesTo:
  - maker-tool
summary: >-
  Foundry endpoints can be deployed behind private endpoints inside a
  customer-managed Virtual Network, with outbound traffic restricted by
  egress controls, so prompts and grounding data never traverse the
  public internet.
